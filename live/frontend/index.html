<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mangoma Live - Test Stream</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0f0f23;
      color: #e0e0e0;
    }
    h1 { color: #7f5af0; }
    .status {
      padding: 1rem;
      background: #1a1a2e;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .status.connected { border-left: 4px solid #2ecc71; }
    .status.disconnected { border-left: 4px solid #e74c3c; }
    button {
      background: #7f5af0;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      margin: 0.25rem;
      font-size: 1rem;
    }
    button:disabled { background: #555; cursor: not-allowed; }
    select, input[type="text"] {
      padding: 0.5rem;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #e0e0e0;
      border-radius: 4px;
      margin: 0.25rem;
    }
    .log {
      background: #000;
      padding: 1rem;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.875rem;
    }
    .log-entry { margin: 0.25rem 0; }
    .log-entry.sent { color: #2ecc71; }
    .log-entry.received { color: #3498db; }
    .log-entry.error { color: #e74c3c; }
    .log-entry.info { color: #f39c12; }
  </style>
</head>
<body>
  <h1>🎵 Mangoma Live</h1>
  
  <div class="status disconnected" id="status">
    Disconnected
  </div>

  <div>
    <button id="connectBtn">Connect</button>
    <button id="startBtn" disabled>Start Streaming</button>
    <button id="stopBtn" disabled>Stop Streaming</button>
  </div>

  <div style="margin-top: 1rem;">
    <label>Preset: </label>
    <select id="presetSelect">
      <option value="">-- Select Preset --</option>
    </select>
    <button id="loadPresetBtn" disabled>Load</button>
  </div>

  <div class="log" id="log">
    <div class="log-entry info">Ready to connect...</div>
  </div>

  <script>
    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = wsProtocol + '//' + location.host + '/live/stream';
    let ws = null;
    let mediaRecorder = null;

    const log = (msg, type = 'info') => {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    const updateStatus = (status, connected) => {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = status;
      statusDiv.className = 'status ' + (connected ? 'connected' : 'disconnected');
    };

    document.getElementById('connectBtn').addEventListener('click', async () => {
      if (ws) {
        ws.close();
        return;
      }

      log('Connecting to: ' + wsUrl, 'info');
      try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          updateStatus('Connected', true);
          document.getElementById('connectBtn').textContent = 'Disconnect';
          document.getElementById('startBtn').disabled = false;
          document.getElementById('loadPresetBtn').disabled = false;
          log('Connected to server', 'received');
          loadPresets(); // Auto-fetch presets
        };

        ws.onmessage = async (event) => {
          if (event.data instanceof Blob) {
            log('Received audio chunk: ' + event.data.size + ' bytes', 'received');
          } else {
            const msg = JSON.parse(event.data);
            log('Message: ' + JSON.stringify(msg), 'received');
          }
        };

        ws.onclose = () => {
          updateStatus('Disconnected', false);
          document.getElementById('connectBtn').textContent = 'Connect';
          document.getElementById('startBtn').disabled = true;
          document.getElementById('loadPresetBtn').disabled = true;
          stopRecording();
          log('Disconnected', 'info');
        };

        ws.onerror = (error) => {
          log('WebSocket error', 'error');
        };

      } catch (error) {
        log('Failed to connect: ' + error, 'error');
      }
    });

    document.getElementById('startBtn').addEventListener('click', async () => {
      if (!ws) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: {
            sampleRate: 48000,
            channelCount: 2,
            echoCancellation: true,
            noiseSuppression: true
          } 
        });

        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            event.data.arrayBuffer().then(buffer => {
              if (ws.readyState === WebSocket.OPEN) {
                ws.send(buffer);
              }
            });
          }
        };

        mediaRecorder.start(100);
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        log('Recording started', 'info');

      } catch (error) {
        log('Microphone access denied: ' + error, 'error');
      }
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      stopRecording();
    });

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        log('Recording stopped', 'info');
      }
    }

    const loadPresets = async () => {
      try {
        const res = await fetch('/api/presets');
        const data = await res.json();
        const select = document.getElementById('presetSelect');
        select.innerHTML = '<option value="">-- Select Preset --</option>';
        data.presets.forEach((preset) => {
          const opt = document.createElement('option');
          opt.value = preset.id;
          opt.textContent = preset.name;
          select.appendChild(opt);
        });
      } catch (error) {
        log('Failed to fetch presets: ' + error, 'error');
      }
    };

    document.getElementById('loadPresetBtn').addEventListener('click', async () => {
      const presetId = document.getElementById('presetSelect').value;
      if (!presetId || !ws) return;

      ws.send(JSON.stringify({ type: 'preset', presetId }));
      log('Loaded preset: ' + presetId, 'info');
    });

    // Auto-load presets when connected
    ws = null;
  </script>
</body>
</html>
